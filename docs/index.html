<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="09-rock-paper-scissors.css" />
    <style></style>
  </head>
  <body class="text-center p-4 sm:p-8 md:p-12">
    
    <p class="title text-3xl sm:text-4xl md:text-5xl font-bold mt-4 mb-8 sm:mb-12">Rock Paper Scissors</p>
    
    <button onclick="playGame('rock');" class="move-button inline-flex items-center justify-center mx-2 my-2 sm:mx-4 w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40">
      <img src="rock-emoji.png" class="move-icon w-12 sm:w-16 md:w-20" alt="" />
    </button>
    
    <button onclick="playGame('paper');" class="move-button inline-flex items-center justify-center mx-2 my-2 sm:mx-4 w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40">
      <img src="paper-emoji.png" class="move-icon w-12 sm:w-16 md:w-20" alt="" />
    </button>
    
    <button
      onclick="
      playGame('scissors');
    "
      class="move-button inline-flex items-center justify-center mx-2 my-2 sm:mx-4 w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40"
    >
      <img src="scissors-emoji.png" class="move-icon w-12 sm:w-16 md:w-20" alt="" />
    </button>

    <p class="js-result result text-xl sm:text-2xl md:text-3xl font-semibold mt-8 sm:mt-12"></p>
    <p class="js-moves text-base sm:text-lg md:text-xl my-4 sm:my-6"></p>

    <p class="score js-score text-lg sm:text-xl md:text-2xl mb-8 sm:mb-12"></p>

    <button
      class="reset-button px-4 py-2 sm:px-6 sm:py-3 text-sm sm:text-base md:text-lg"
      onclick="
    score.wins=0;
    score.losses=0;
    score.ties=0;
    
    localStorage.removeItem('score');
    updateScoreElement();
    "
    >
      Reset Score
    </button>
    
    <script src="09-rock-paper-scissors.js"></script>
  </body>
</html>
